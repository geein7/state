<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>한국 주식 차트</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#1f6feb;
  --up:#3fb950;--down:#f85149;--chip:#21262d;
}
body{background:var(--bg);color:var(--text);font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;min-height:100vh}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:12px 20px}
.hdr{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:700;white-space:nowrap;background:linear-gradient(90deg,#58a6ff,#3fb950);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:480px}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--text);font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
#searchResults{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;list-style:none;display:none;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.6);max-height:280px;overflow-y:auto}
#searchResults li{padding:9px 13px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center}
#searchResults li:hover{background:var(--border)}
.r-name{font-weight:500}
.r-sym{color:var(--muted);font-size:11px;font-family:monospace}

/* ── MAIN ── */
main{max-width:1200px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:20px}

/* ── CHART CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;row-gap:8px}
.title-row{display:flex;align-items:center;gap:8px;min-width:150px}
.label{font-size:15px;font-weight:600}
.badge{background:var(--chip);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--muted);font-family:monospace}
.price-row{display:flex;align-items:baseline;gap:8px;flex:1}
.price{font-size:21px;font-weight:700}
.chg{font-size:13px;font-weight:500}
.up{color:var(--up)}.down{color:var(--down)}
.range-btns{display:flex;gap:4px;margin-left:auto}
.rbtn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:4px 9px;cursor:pointer;transition:.15s all}
.rbtn:hover{background:var(--border);color:var(--text)}
.rbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chart-box{width:100%;height:400px}

/* ── CHIPS ── */
.chips-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px}
.chips-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{background:var(--chip);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:12px;padding:5px 13px;cursor:pointer;transition:.15s all}
.chip:hover,.chip.active{background:var(--accent);border-color:var(--accent)}

/* ── LOADER ── */
#loader{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
#loader.show{display:flex}
.spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:s .8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}

/* ── ERROR TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#f85149;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;display:none;z-index:1000}

@media(max-width:600px){
  .chart-box{height:260px}
  .price{font-size:17px}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <h1>한국 주식 차트</h1>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="종목명 검색 (예: 삼성전자)" autocomplete="off"/>
      <ul id="searchResults"></ul>
    </div>
  </div>
</header>

<main>
  <!-- KOSPI -->
  <div class="card" id="kospiCard">
    <div class="card-head">
      <div class="title-row">
        <span class="label">KOSPI 종합지수</span>
        <span class="badge">^KS11</span>
      </div>
      <div class="price-row">
        <span class="price" id="kPrice">-</span>
        <span class="chg" id="kChg">-</span>
      </div>
      <div class="range-btns" id="kRanges">
        <button class="rbtn active" data-r="1mo">1개월</button>
        <button class="rbtn" data-r="3mo">3개월</button>
        <button class="rbtn" data-r="6mo">6개월</button>
        <button class="rbtn" data-r="1y">1년</button>
        <button class="rbtn" data-r="5y">5년</button>
      </div>
    </div>
    <div class="chart-box" id="kChart"></div>
  </div>

  <!-- 주요 종목 -->
  <div class="chips-card">
    <div class="chips-title">주요 종목 바로가기</div>
    <div class="chips" id="chipList">
      <button class="chip" data-s="005930.KS" data-n="삼성전자">삼성전자</button>
      <button class="chip" data-s="000660.KS" data-n="SK하이닉스">SK하이닉스</button>
      <button class="chip" data-s="035420.KS" data-n="NAVER">NAVER</button>
      <button class="chip" data-s="005380.KS" data-n="현대차">현대차</button>
      <button class="chip" data-s="051910.KS" data-n="LG화학">LG화학</button>
      <button class="chip" data-s="006400.KS" data-n="삼성SDI">삼성SDI</button>
      <button class="chip" data-s="035720.KS" data-n="카카오">카카오</button>
      <button class="chip" data-s="000270.KS" data-n="기아">기아</button>
      <button class="chip" data-s="012330.KS" data-n="현대모비스">현대모비스</button>
      <button class="chip" data-s="068270.KS" data-n="셀트리온">셀트리온</button>
      <button class="chip" data-s="207940.KS" data-n="삼성바이오로직스">삼성바이오로직스</button>
      <button class="chip" data-s="028260.KS" data-n="삼성물산">삼성물산</button>
    </div>
  </div>

  <!-- 개별 종목 -->
  <div class="card" id="sCard" style="display:none">
    <div class="card-head">
      <div class="title-row">
        <span class="label" id="sName">-</span>
        <span class="badge" id="sSym">-</span>
      </div>
      <div class="price-row">
        <span class="price" id="sPrice">-</span>
        <span class="chg" id="sChg">-</span>
      </div>
      <div class="range-btns" id="sRanges">
        <button class="rbtn active" data-r="1mo">1개월</button>
        <button class="rbtn" data-r="3mo">3개월</button>
        <button class="rbtn" data-r="6mo">6개월</button>
        <button class="rbtn" data-r="1y">1년</button>
        <button class="rbtn" data-r="5y">5년</button>
      </div>
    </div>
    <div class="chart-box" id="sChart"></div>
  </div>
</main>

<div id="loader"><div class="spin"></div></div>
<div id="toast"></div>

<script>
// ────────────────────────────────────────────
// CORS 프록시 목록 (순서대로 시도)
// ────────────────────────────────────────────
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

let workingProxyIdx = 0;

async function fetchWithProxy(url) {
  for (let i = workingProxyIdx; i < PROXIES.length; i++) {
    try {
      const proxyUrl = PROXIES[i](url);
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(12000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (!text || text.length < 10) throw new Error('empty');
      workingProxyIdx = i; // 성공한 프록시 기억
      return JSON.parse(text);
    } catch(e) {
      console.warn(`Proxy ${i} failed:`, e.message);
    }
  }
  throw new Error('모든 프록시 실패');
}

// ────────────────────────────────────────────
// Yahoo Finance 데이터 fetch
// ────────────────────────────────────────────
async function fetchChart(symbol, range, interval) {
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}`;
  const params = `?range=${range}&interval=${interval}&includePrePost=false&events=div`;
  const data = await fetchWithProxy(base + params);

  const result = data.chart?.result?.[0];
  if (!result) throw new Error('데이터 없음');

  const ts = result.timestamp;
  const q = result.indicators.quote[0];
  const meta = result.meta;

  const candles = ts.map((t, i) => ({
    time: t,
    open: q.open[i],
    high: q.high[i],
    low: q.low[i],
    close: q.close[i],
    volume: q.volume[i],
  })).filter(c => c.open != null && c.close != null);

  return {
    candles,
    price: meta.regularMarketPrice,
    prevClose: meta.chartPreviousClose,
    currency: meta.currency,
  };
}

async function searchStocks(q) {
  const base = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(q)}&quotesCount=10&newsCount=0`;
  const data = await fetchWithProxy(base);
  return (data.quotes || [])
    .filter(x => x.symbol && (x.symbol.endsWith('.KS') || x.symbol.endsWith('.KQ')))
    .map(x => ({ symbol: x.symbol, name: x.longname || x.shortname || x.symbol }));
}

// ────────────────────────────────────────────
// 차트 공통 옵션
// ────────────────────────────────────────────
const C_OPT = {
  layout:{ background:{color:'#161b22'}, textColor:'#8b949e' },
  grid:{ vertLines:{color:'#21262d'}, horzLines:{color:'#21262d'} },
  crosshair:{ mode: LightweightCharts.CrosshairMode.Normal },
  rightPriceScale:{ borderColor:'#30363d' },
  timeScale:{ borderColor:'#30363d', timeVisible:true, secondsVisible:false },
};
const CANDLE_OPT = {
  upColor:'#3fb950', downColor:'#f85149',
  borderUpColor:'#3fb950', borderDownColor:'#f85149',
  wickUpColor:'#3fb950', wickDownColor:'#f85149',
};

function makeChart(containerId) {
  const el = document.getElementById(containerId);
  const chart = LightweightCharts.createChart(el, { ...C_OPT, width: el.clientWidth, height: el.clientHeight });
  const candle = chart.addCandlestickSeries(CANDLE_OPT);
  const vol = chart.addHistogramSeries({
    priceFormat:{ type:'volume' }, priceScaleId:'vol',
  });
  vol.priceScale().applyOptions({ scaleMargins:{ top:0.8, bottom:0 } });
  window.addEventListener('resize', () => chart.applyOptions({ width: el.clientWidth }));
  return { chart, candle, vol };
}

// ────────────────────────────────────────────
// UI 헬퍼
// ────────────────────────────────────────────
const loader = document.getElementById('loader');
const toast  = document.getElementById('toast');
let toastTimer;

function loading(on) { loader.classList.toggle('show', on); }

function showToast(msg) {
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.style.display = 'none'; }, 4000);
}

function fmt(n) {
  if (n == null) return '-';
  return n.toLocaleString('ko-KR', { maximumFractionDigits: 2 });
}

function setChg(el, cur, prev) {
  if (cur == null || prev == null) { el.textContent = '-'; return; }
  const d = cur - prev, p = (d / prev) * 100;
  const s = d >= 0 ? '+' : '';
  el.textContent = `${s}${fmt(d)} (${s}${p.toFixed(2)}%)`;
  el.className = 'chg ' + (d >= 0 ? 'up' : 'down');
}

function intervalFor(range) {
  return range === '5y' ? '1wk' : '1d';
}

// ────────────────────────────────────────────
// KOSPI 차트
// ────────────────────────────────────────────
let kInst = null;
let kRange = '1mo';

function initKospi() {
  kInst = makeChart('kChart');
}

async function loadKospi(range) {
  loading(true);
  try {
    const d = await fetchChart('^KS11', range, intervalFor(range));
    kInst.candle.setData(d.candles.map(c => ({ time:c.time, open:c.open, high:c.high, low:c.low, close:c.close })));
    kInst.vol.setData(d.candles.map(c => ({
      time:c.time, value:c.volume,
      color: c.close >= c.open ? '#3fb95055' : '#f8514955',
    })));
    kInst.chart.timeScale().fitContent();
    const last = d.candles[d.candles.length - 1];
    document.getElementById('kPrice').textContent = fmt(last?.close);
    setChg(document.getElementById('kChg'), last?.close, d.prevClose);
  } catch(e) {
    showToast('KOSPI 데이터 로드 실패: ' + e.message);
  } finally {
    loading(false);
  }
}

// ────────────────────────────────────────────
// 개별 종목 차트
// ────────────────────────────────────────────
let sInst = null;
let curSym = null, curName = null, sRange = '1mo';

function initStock() {
  sInst = makeChart('sChart');
}

async function loadStock(symbol, name, range) {
  const card = document.getElementById('sCard');
  card.style.display = 'block';
  if (!sInst) initStock();
  loading(true);
  try {
    const d = await fetchChart(symbol, range, intervalFor(range));
    sInst.candle.setData(d.candles.map(c => ({ time:c.time, open:c.open, high:c.high, low:c.low, close:c.close })));
    sInst.vol.setData(d.candles.map(c => ({
      time:c.time, value:c.volume,
      color: c.close >= c.open ? '#3fb95055' : '#f8514955',
    })));
    sInst.chart.timeScale().fitContent();
    const last = d.candles[d.candles.length - 1];
    document.getElementById('sName').textContent = name;
    document.getElementById('sSym').textContent = symbol;
    document.getElementById('sPrice').textContent = fmt(last?.close);
    setChg(document.getElementById('sChg'), last?.close, d.prevClose);
    card.scrollIntoView({ behavior:'smooth', block:'start' });
  } catch(e) {
    showToast(name + ' 데이터 로드 실패: ' + e.message);
  } finally {
    loading(false);
  }
}

// ────────────────────────────────────────────
// 이벤트 연결
// ────────────────────────────────────────────
// KOSPI 기간 버튼
document.getElementById('kRanges').addEventListener('click', e => {
  const btn = e.target.closest('.rbtn');
  if (!btn) return;
  document.querySelectorAll('#kRanges .rbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  kRange = btn.dataset.r;
  loadKospi(kRange);
});

// 종목 기간 버튼
document.getElementById('sRanges').addEventListener('click', e => {
  const btn = e.target.closest('.rbtn');
  if (!btn) return;
  document.querySelectorAll('#sRanges .rbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  sRange = btn.dataset.r;
  if (curSym) loadStock(curSym, curName, sRange);
});

// 칩 클릭
document.getElementById('chipList').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  curSym = chip.dataset.s;
  curName = chip.dataset.n;
  sRange = '1mo';
  document.querySelectorAll('#sRanges .rbtn').forEach((b, i) => b.classList.toggle('active', i === 0));
  loadStock(curSym, curName, sRange);
});

// 검색
let sTimer;
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  clearTimeout(sTimer);
  const q = searchInput.value.trim();
  if (!q) { searchResults.style.display = 'none'; return; }
  sTimer = setTimeout(async () => {
    try {
      const items = await searchStocks(q);
      searchResults.innerHTML = '';
      if (!items.length) {
        searchResults.innerHTML = '<li style="color:var(--muted)">검색 결과 없음</li>';
      } else {
        items.forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<span class="r-name">${item.name}</span><span class="r-sym">${item.symbol}</span>`;
          li.onclick = () => {
            searchResults.style.display = 'none';
            searchInput.value = '';
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            curSym = item.symbol;
            curName = item.name;
            sRange = '1mo';
            document.querySelectorAll('#sRanges .rbtn').forEach((b, i) => b.classList.toggle('active', i === 0));
            loadStock(curSym, curName, sRange);
          };
          searchResults.appendChild(li);
        });
      }
      searchResults.style.display = 'block';
    } catch { searchResults.style.display = 'none'; }
  }, 350);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) searchResults.style.display = 'none';
});

// ────────────────────────────────────────────
// 시작
// ────────────────────────────────────────────
initKospi();
loadKospi('1mo');
</script>
</body>
</html>
